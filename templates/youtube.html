<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YouTube Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0e0c">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      background: #0f0e0c;
      color: #f0ece4;
      min-height: 100vh;
      padding: 48px 16px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      width: 520px; height: 520px;
      border-radius: 50%;
      top: -180px; left: -180px;
      background: radial-gradient(circle at 30% 30%, rgba(255,0,0,0.10) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
      animation: swirl1 18s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: fixed;
      width: 520px; height: 520px;
      border-radius: 50%;
      bottom: -180px; right: -180px;
      background: radial-gradient(circle at 70% 70%, rgba(255,0,0,0.10) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
      animation: swirl2 22s ease-in-out infinite alternate;
    }
    @keyframes swirl1 { 0% { transform: rotate(0deg) scale(1); } 100% { transform: rotate(25deg) scale(1.12); } }
    @keyframes swirl2 { 0% { transform: rotate(0deg) scale(1); } 100% { transform: rotate(-20deg) scale(1.1); } }

    .page { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; }

    nav { display: flex; gap: 24px; margin-bottom: 40px; }
    nav a {
      font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none; transition: color 0.2s;
      color: rgba(240,236,228,0.4);
    }
    nav a.active { color: #ff4444; }
    nav a:hover { color: #ff4444; }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem; font-weight: 600;
      margin-bottom: 6px;
    }
    .tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic; color: #ff4444;
      font-size: 1rem; margin-bottom: 36px;
      letter-spacing: 0.04em;
    }
    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, #ff4444, transparent);
      margin-bottom: 40px;
    }

    /* Stat cards */
    .stats-row { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
    .stat-card {
      flex: 1; min-width: 140px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,68,68,0.2);
      border-radius: 14px; padding: 24px 20px;
      text-align: center;
    }
    .stat-card .num {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; font-weight: 600; color: #ff4444;
    }
    .stat-card .label {
      font-size: 0.7rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(240,236,228,0.5);
      margin-top: 6px;
    }

    /* Grid layout */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .grid.full { grid-template-columns: 1fr; }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,68,68,0.15);
      border-radius: 14px; padding: 28px;
    }
    .card h3 {
      font-size: 0.65rem; font-weight: 400;
      text-transform: uppercase; letter-spacing: 0.14em;
      color: #ff4444; margin-bottom: 20px;
    }

    /* Bar chart */
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-label { font-size: 0.82rem; color: #d8d0c4; min-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-label.narrow { min-width: 30px; text-align: right; }
    .bar-track { flex: 1; background: rgba(255,255,255,0.06); border-radius: 4px; height: 8px; }
    .bar-fill { height: 8px; border-radius: 4px; background: linear-gradient(to right, #ff4444, #ff7744); }
    .bar-count { font-size: 0.78rem; color: rgba(240,236,228,0.4); min-width: 40px; text-align: right; }

    /* Recent list */
    .recent-item { padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.88rem; }
    .recent-item:last-child { border-bottom: none; }
    .recent-title { color: #f0ece4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recent-channel { font-size: 0.75rem; color: #ff4444; margin-top: 2px; }

    /* Recommendations */
    .rec-item { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .rec-item:last-child { border-bottom: none; }
    .rec-name { font-family: 'Playfair Display', serif; font-size: 1rem; color: #f0ece4; }
    .rec-why { font-size: 0.82rem; color: rgba(240,236,228,0.5); margin-top: 4px; line-height: 1.5; }

    button.rec-btn {
      width: 100%; padding: 12px;
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem; font-weight: 600;
      background: linear-gradient(135deg, #ff4444, #cc2222);
      color: #fff; border: none; border-radius: 10px;
      cursor: pointer; margin-bottom: 20px;
      transition: opacity 0.2s;
    }
    button.rec-btn:hover { opacity: 0.85; }
    button.rec-btn:disabled { opacity: 0.4; cursor: default; }

    #loading {
      text-align: center; padding: 80px;
      font-family: 'Playfair Display', serif;
      font-style: italic; color: rgba(240,236,228,0.4);
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .stats-row { flex-direction: column; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
<div class="page">
  <nav>
    <a href="/">Recipe Maker</a>
    <a href="/playlist">Playlist Maker</a>
    <a href="/youtube" class="active">YouTube</a>
    <a href="/translator">Translator</a>
  </nav>

  <h1>YouTube Dashboard</h1>
  <p class="tagline">Everything you've been watching.</p>
  <div class="divider"></div>

  <div id="loading">Loading your watch history...</div>
  <div id="dashboard" style="display:none"></div>
</div>

<script>
async function load() {
  const resp = await fetch("/youtube/data");
  const d = await resp.json();

  document.getElementById("loading").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  const maxCh = d.top_channels[0][1];
  const maxHr = Math.max(...d.hour_counts.map(x => x[1]));
  const maxDow = Math.max(...d.dow_counts.map(x => x[1]));
  const maxMo = Math.max(...d.month_counts.map(x => x[1]));

  document.getElementById("dashboard").innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="num">${d.total.toLocaleString()}</div><div class="label">Videos Watched</div></div>
      <div class="stat-card"><div class="num">${d.unique_channels.toLocaleString()}</div><div class="label">Unique Channels</div></div>
      <div class="stat-card"><div class="num">${d.top_channels[0][0].split(' ')[0]}</div><div class="label">Top Channel</div></div>
      <div class="stat-card"><div class="num">${d.month_counts.length}</div><div class="label">Months of Data</div></div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Top Channels</h3>
        ${d.top_channels.map(([ch, n]) => `
          <div class="bar-row">
            <div class="bar-label">${ch}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxCh*100)}%"></div></div>
            <div class="bar-count">${n}</div>
          </div>`).join("")}
      </div>

      <div class="card">
        <h3>Recently Watched</h3>
        ${d.recent.map(v => `
          <div class="recent-item">
            <div class="recent-title">${v.title}</div>
            <div class="recent-channel">${v.channel}</div>
          </div>`).join("")}
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Watch Activity by Hour</h3>
        ${d.hour_counts.map(([h, n]) => `
          <div class="bar-row">
            <div class="bar-label narrow">${h}:00</div>
            <div class="bar-track"><div class="bar-fill" style="width:${maxHr ? Math.round(n/maxHr*100) : 0}%"></div></div>
            <div class="bar-count">${n}</div>
          </div>`).join("")}
      </div>

      <div class="card">
        <h3>Activity by Day of Week</h3>
        ${d.dow_counts.map(([day, n]) => `
          <div class="bar-row">
            <div class="bar-label">${day}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${maxDow ? Math.round(n/maxDow*100) : 0}%"></div></div>
            <div class="bar-count">${n}</div>
          </div>`).join("")}

        <h3 style="margin-top:28px;">Activity by Month</h3>
        ${d.month_counts.slice(-12).map(([mo, n]) => `
          <div class="bar-row">
            <div class="bar-label">${mo}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${maxMo ? Math.round(n/maxMo*100) : 0}%"></div></div>
            <div class="bar-count">${n}</div>
          </div>`).join("")}
      </div>
    </div>

    <div class="grid full">
      <div class="card">
        <h3>Creator Recommendations</h3>
        <button class="rec-btn" id="recBtn" onclick="loadRecs()">Generate Recommendations Based on My Taste</button>
        <div id="recs"></div>
      </div>
    </div>
  `;
}

async function loadRecs() {
  const btn = document.getElementById("recBtn");
  btn.disabled = true;
  btn.textContent = "Analyzing your taste...";
  const resp = await fetch("/youtube/recommend", { method: "POST" });
  const data = await resp.json();
  btn.style.display = "none";

  const lines = data.recommendations.split("\n");
  let html = "";
  let name = "", why = "";
  for (const line of lines) {
    if (line.startsWith("CHANNEL:")) {
      if (name) html += `<div class="rec-item"><div class="rec-name">${name}</div><div class="rec-why">${why}</div></div>`;
      name = line.replace("CHANNEL:", "").trim(); why = "";
    } else if (line.startsWith("WHY:")) {
      why = line.replace("WHY:", "").trim();
    }
  }
  if (name) html += `<div class="rec-item"><div class="rec-name">${name}</div><div class="rec-why">${why}</div></div>`;
  document.getElementById("recs").innerHTML = html;
}

load();
</script>
</body>
</html>
